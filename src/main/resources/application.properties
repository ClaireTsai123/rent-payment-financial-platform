spring.application.name=rent-payment-financial-platform
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/rent_payment}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:rent_payment}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:rent_payment}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true
provider.webhook.mock-provider.shared-secret=${MOCK_PROVIDER_WEBHOOK_SECRET:local-mock-webhook-secret}
outbox.publisher.batch-size=${OUTBOX_PUBLISHER_BATCH_SIZE:100}
outbox.publisher.max-attempts=${OUTBOX_PUBLISHER_MAX_ATTEMPTS:3}
outbox.publisher.retry-delay=${OUTBOX_PUBLISHER_RETRY_DELAY:PT1M}
outbox.publisher.fixed-delay=${OUTBOX_PUBLISHER_FIXED_DELAY:PT5S}
outbox.publisher.scheduler-enabled=${OUTBOX_PUBLISHER_SCHEDULER_ENABLED:true}
